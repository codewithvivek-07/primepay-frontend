<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
  <title>Payment Failed - PrimePay</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="page-wrapper">

    <div class="logo-section">
      <div class="logo-icon">₹</div>
      <div class="logo-title">PrimePay</div>
      <div class="logo-subtitle">Test Gateway · Secure UPI Payments</div>
    </div>

    <div class="glass-card">

      <div class="result-icon failure">
        <svg viewBox="0 0 24 24" fill="none" stroke="var(--error)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </div>

      <div class="result-title failure">Payment Failed</div>
      <div class="result-subtitle" id="errorMessage">
        Your transaction could not be completed. No amount has been deducted, or it will be refunded automatically.
      </div>

      <div class="detail-row">
        <span class="detail-label">Order ID</span>
        <span class="detail-value" id="orderIdValue">—</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Amount</span>
        <span class="detail-value" id="amountValue">₹0.00</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Status</span>
        <span class="detail-value" style="color: var(--error);">Failed</span>
      </div>

      <div class="action-row">
        <a href="index.html" class="btn btn-primary" style="text-decoration:none;">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          Retry Payment
        </a>
      </div>
      <div class="action-row">
        <a href="dashboard.html" class="btn btn-secondary" style="text-decoration:none;">View Dashboard</a>
      </div>
    </div>

    <div class="footer-note">🔒 Secured by TranzUPI · This is a test gateway environment</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/failed.js"></script>
</body>
</html>
